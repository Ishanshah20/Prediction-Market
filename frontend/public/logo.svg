<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="22" stroke="url(#ring)" stroke-width="2.5" fill="none"/>
  <!-- Chart bars (prediction) -->
  <rect x="10" y="28" width="5" height="10" rx="1.5" fill="url(#bar1)"/>
  <rect x="17" y="20" width="5" height="18" rx="1.5" fill="url(#bar2)"/>
  <rect x="24" y="14" width="5" height="24" rx="1.5" fill="url(#bar3)"/>
  <rect x="31" y="22" width="5" height="16" rx="1.5" fill="url(#bar4)"/>
  <!-- Trend line -->
  <polyline points="12,27 19,19 26,13 33,21" stroke="url(#line)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dot at peak -->
  <circle cx="26" cy="13" r="2.5" fill="#38bdf8"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="line" x1="10" y1="27" x2="33" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
